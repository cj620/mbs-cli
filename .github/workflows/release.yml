name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  pack:
    name: Build & Pack
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Create CLI deploy bundle
        run: pnpm deploy --filter @mb-it-org/cli --legacy ${{ runner.temp }}/mbs-deploy

      - name: Convert to npm-compatible layout
        working-directory: ${{ runner.temp }}/mbs-deploy
        run: |
          # Extract workspace packages to a stable directory with absolute file: refs
          node << 'EOF'
          const fs = require('fs');
          const path = require('path');
          const deployDir = process.cwd();
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const depSections = ['dependencies', 'optionalDependencies', 'peerDependencies', 'devDependencies'];

          function collectWorkspaceDeps(pkgJson) {
            const names = new Set();
            for (const section of depSections) {
              for (const [name, ver] of Object.entries(pkgJson[section] || {})) {
                if (typeof ver === 'string' && ver.startsWith('workspace:')) names.add(name);
              }
            }
            return [...names];
          }

          function rewriteWorkspaceRefs(pkgJson, workspaceFileRefs) {
            for (const section of depSections) {
              const deps = pkgJson[section];
              if (!deps) continue;
              for (const [name, ver] of Object.entries(deps)) {
                if (typeof ver !== 'string' || !ver.startsWith('workspace:')) continue;
                const fileRef = workspaceFileRefs.get(name);
                if (fileRef) deps[name] = 'file:' + fileRef;
              }
            }
          }

          fs.mkdirSync('.ws', { recursive: true });
          const workspaceNames = collectWorkspaceDeps(pkg);
          const workspaceFileRefs = new Map();

          for (const name of workspaceNames) {
            const safeName = name.replace(/^@/, '').replace('/', '__');
            const src = path.join('node_modules', name);
            const dest = path.join('.ws', safeName);
            fs.cpSync(src, dest, { recursive: true, dereference: true });
            const fileRef = path.join(deployDir, '.ws', safeName);
            workspaceFileRefs.set(name, fileRef);
          }

          rewriteWorkspaceRefs(pkg, workspaceFileRefs);
          for (const name of workspaceNames) {
            const safeName = name.replace(/^@/, '').replace('/', '__');
            const wsPkgPath = path.join('.ws', safeName, 'package.json');
            if (!fs.existsSync(wsPkgPath)) continue;
            const wsPkg = JSON.parse(fs.readFileSync(wsPkgPath, 'utf8'));
            rewriteWorkspaceRefs(wsPkg, workspaceFileRefs);
            fs.writeFileSync(wsPkgPath, JSON.stringify(wsPkg, null, 2));
          }

          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          EOF

          # Remove pnpm's virtual store and reinstall with plain npm
          rm -rf node_modules
          npm install --omit=dev --ignore-scripts
          # oclif is a devDep needed to run pack/manifest — install it as a prod dep
          npm install oclif --ignore-scripts
          npm shrinkwrap --ignore-scripts

          # Symlink .git so oclif can resolve git HEAD
          ln -s ${{ github.workspace }}/.git .git

      - name: Prepare npm publish metadata
        working-directory: ${{ runner.temp }}/mbs-deploy
        run: |
          node << 'EOF'
          const fs = require('fs');
          const path = require('path');
          const depSections = ['dependencies', 'optionalDependencies', 'peerDependencies'];

          function readJson(filePath) {
            return JSON.parse(fs.readFileSync(filePath, 'utf8'));
          }

          function writeJson(filePath, data) {
            fs.writeFileSync(filePath, JSON.stringify(data, null, 2));
          }

          function getWorkspacePackages(wsDir) {
            const entries = fs.readdirSync(wsDir, { withFileTypes: true }).filter((entry) => entry.isDirectory());
            return new Map(
              entries.map((entry) => {
                const pkgPath = path.join(wsDir, entry.name, 'package.json');
                const pkg = readJson(pkgPath);
                return [
                  pkg.name,
                  {
                    version: pkg.version,
                    wsPkgPath: pkgPath,
                    installedPkgPath: path.join('node_modules', pkg.name, 'package.json'),
                  },
                ];
              }),
            );
          }

          function rewriteInternalRefs(pkgJson, workspacePackages) {
            for (const section of depSections) {
              const deps = pkgJson[section];
              if (!deps) continue;
              for (const [name, version] of Object.entries(deps)) {
                const info = workspacePackages.get(name);
                if (!info) continue;
                if (typeof version === 'string' && (version.startsWith('workspace:') || version.startsWith('file:'))) {
                  deps[name] = info.version;
                }
              }
            }
          }

          const pkgPath = path.join(process.cwd(), 'package.json');
          const pkg = readJson(pkgPath);
          const workspacePackages = getWorkspacePackages(path.join(process.cwd(), '.ws'));

          rewriteInternalRefs(pkg, workspacePackages);
          pkg.bundledDependencies = Array.from(workspacePackages.keys());
          writeJson(pkgPath, pkg);

          for (const info of workspacePackages.values()) {
            const wsPkg = readJson(info.wsPkgPath);
            rewriteInternalRefs(wsPkg, workspacePackages);
            writeJson(info.wsPkgPath, wsPkg);

            if (fs.existsSync(info.installedPkgPath)) {
              const installedPkg = readJson(info.installedPkgPath);
              rewriteInternalRefs(installedPkg, workspacePackages);
              writeJson(info.installedPkgPath, installedPkg);
            }
          }
          EOF

          node ${{ github.workspace }}/scripts/prune-optional-platform-deps.cjs .
          npm shrinkwrap --ignore-scripts
          rm -f pnpm-lock.yaml

      - name: Validate npm bundle installability
        working-directory: ${{ runner.temp }}/mbs-deploy
        run: |
          node << 'EOF'
          const fs = require('fs');
          const path = require('path');

          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const serialized = JSON.stringify(pkg);

          if (serialized.includes('workspace:')) {
            throw new Error('publish manifest still contains workspace:* references');
          }

          if (!Array.isArray(pkg.bundledDependencies) || pkg.bundledDependencies.length === 0) {
            throw new Error('publish manifest must declare bundledDependencies for internal workspace packages');
          }

          if (pkg.name !== '@mb-it-org/cli') {
            throw new Error('publish manifest must keep the @mb-it-org/cli package name');
          }

          if (!pkg.bin || pkg.bin.mbs !== 'bin/run.js') {
            throw new Error('publish manifest must preserve the mbs binary entry');
          }

          if (pkg.dependencies?.playwright) {
            throw new Error('publish manifest must not keep playwright as a production dependency');
          }

          if (!pkg.dependencies?.['playwright-core']) {
            throw new Error('publish manifest must keep playwright-core as the login runtime dependency');
          }

          const shrinkwrap = fs.readFileSync(path.join(process.cwd(), 'npm-shrinkwrap.json'), 'utf8');
          if (shrinkwrap.includes('workspace:')) {
            throw new Error('npm-shrinkwrap.json still contains workspace:* references');
          }

          if (fs.existsSync(path.join(process.cwd(), 'pnpm-lock.yaml'))) {
            throw new Error('publish bundle must remove pnpm-lock.yaml before oclif packaging');
          }

          if (shrinkwrap.includes('"node_modules/playwright"') || shrinkwrap.includes('"playwright": {')) {
            throw new Error('npm-shrinkwrap.json must not include playwright as a production dependency');
          }
          EOF

          PACK_FILE=$(npm pack)
          tar -tf "$PACK_FILE" | grep 'package/dist/commands/skills/path.js' >/dev/null
          tar -tf "$PACK_FILE" | grep 'package/dist/commands/skills/show.js' >/dev/null
          tar -tf "$PACK_FILE" | grep 'package/skills/SKILL.md' >/dev/null
          if tar -tf "$PACK_FILE" | grep 'package/skills/skills/' >/dev/null; then
            echo 'npm tarball must not contain nested skills/skills directories'
            exit 1
          fi
          TEST_PREFIX=$(mktemp -d)
          npm install --global "./${PACK_FILE}" --prefix "$TEST_PREFIX"
          "$TEST_PREFIX/bin/mbs" --help >/dev/null
          "$TEST_PREFIX/bin/mbs" skills path | grep '"ok":true' >/dev/null
          "$TEST_PREFIX/bin/mbs" skills show | grep '"ok":true' >/dev/null
          "$TEST_PREFIX/bin/mbs" skills show --file references/global.md | grep '"ok":true' >/dev/null

      - name: Generate oclif manifest
        working-directory: ${{ runner.temp }}/mbs-deploy
        run: |
          node ${{ github.workspace }}/scripts/materialize-bundled-workspace-deps.cjs .
          rm -f npm-shrinkwrap.json package-lock.json
          npm shrinkwrap --ignore-scripts
          (cd node_modules/@mb-it-org/org && ../../../node_modules/.bin/oclif manifest)
          ./node_modules/.bin/oclif manifest

      - name: Pack tarballs for Mac + Windows
        working-directory: ${{ runner.temp }}/mbs-deploy
        run: |
          node ${{ github.workspace }}/scripts/materialize-bundled-workspace-deps.cjs .
          rm -f npm-shrinkwrap.json package-lock.json
          npm shrinkwrap --ignore-scripts
          ./node_modules/.bin/oclif pack tarballs --targets darwin-x64,darwin-arm64,win32-x64

      - name: Upload packed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers
          path: ${{ runner.temp }}/mbs-deploy/dist/*.tar.gz

      - name: Publish @mb-it-org/cli to npm
        working-directory: ${{ runner.temp }}/mbs-deploy
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PUBLISHED_VERSION=$(npm view @mb-it-org/cli version --json 2>/dev/null || echo '')
          CURRENT_VERSION=$(node -p "require('./package.json').version")

          if [ "$PUBLISHED_VERSION" = "\"$CURRENT_VERSION\"" ] || [ "$PUBLISHED_VERSION" = "$CURRENT_VERSION" ]; then
            echo "Version $CURRENT_VERSION is already published on npm"
            exit 1
          fi

          npm publish --access public

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: pack

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: installers
          path: dist/

      - name: Generate Release Notes
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${CURRENT_TAG}$" | head -n 1)

          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"%s" "${PREV_TAG}..HEAD")
          fi

          FEATURES=""
          FIXES=""
          MAINTENANCE=""

          while IFS= read -r msg; do
            if [[ "$msg" =~ ^feat(\(.+\))?: ]]; then
              FEATURES="${FEATURES}- ${msg}\n"
            elif [[ "$msg" =~ ^fix(\(.+\))?: ]]; then
              FIXES="${FIXES}- ${msg}\n"
            elif [[ "$msg" =~ ^(chore|ci|docs|refactor|perf|test|build)(\(.+\))?: ]]; then
              MAINTENANCE="${MAINTENANCE}- ${msg}\n"
            fi
          done <<< "$COMMITS"

          BODY=""
          if [ -n "$FEATURES" ]; then
            BODY="${BODY}## 新功能\n${FEATURES}\n"
          fi
          if [ -n "$FIXES" ]; then
            BODY="${BODY}## Bug 修复\n${FIXES}\n"
          fi
          if [ -n "$MAINTENANCE" ]; then
            BODY="${BODY}## 维护\n${MAINTENANCE}\n"
          fi
          if [ -z "$BODY" ]; then
            BODY="本次发布无 Conventional Commits 格式提交记录。\n"
          fi

          printf "%b" "$BODY" > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release_notes.md
          files: dist/*.tar.gz
          draft: false
          prerelease: false
