name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  pack:
    name: Build & Pack
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Create CLI deploy bundle
        run: pnpm deploy --filter @mbs/cli --legacy ${{ runner.temp }}/mbs-deploy

      - name: Convert to npm-compatible layout
        working-directory: ${{ runner.temp }}/mbs-deploy
        run: |
          # Extract workspace packages to a stable directory with absolute file: refs
          node << 'EOF'
          const fs = require('fs');
          const path = require('path');
          const deployDir = process.cwd();
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const depSections = ['dependencies', 'optionalDependencies', 'peerDependencies', 'devDependencies'];

          function collectWorkspaceDeps(pkgJson) {
            const names = new Set();
            for (const section of depSections) {
              for (const [name, ver] of Object.entries(pkgJson[section] || {})) {
                if (typeof ver === 'string' && ver.startsWith('workspace:')) names.add(name);
              }
            }
            return [...names];
          }

          function rewriteWorkspaceRefs(pkgJson, workspaceFileRefs) {
            for (const section of depSections) {
              const deps = pkgJson[section];
              if (!deps) continue;
              for (const [name, ver] of Object.entries(deps)) {
                if (typeof ver !== 'string' || !ver.startsWith('workspace:')) continue;
                const fileRef = workspaceFileRefs.get(name);
                if (fileRef) deps[name] = 'file:' + fileRef;
              }
            }
          }

          fs.mkdirSync('.ws', { recursive: true });
          const workspaceNames = collectWorkspaceDeps(pkg);
          const workspaceFileRefs = new Map();

          for (const name of workspaceNames) {
            const safeName = name.replace(/^@/, '').replace('/', '__');
            const src = path.join('node_modules', name);
            const dest = path.join('.ws', safeName);
            fs.cpSync(src, dest, { recursive: true, dereference: true });
            const fileRef = path.join(deployDir, '.ws', safeName);
            workspaceFileRefs.set(name, fileRef);
          }

          rewriteWorkspaceRefs(pkg, workspaceFileRefs);
          for (const name of workspaceNames) {
            const safeName = name.replace(/^@/, '').replace('/', '__');
            const wsPkgPath = path.join('.ws', safeName, 'package.json');
            if (!fs.existsSync(wsPkgPath)) continue;
            const wsPkg = JSON.parse(fs.readFileSync(wsPkgPath, 'utf8'));
            rewriteWorkspaceRefs(wsPkg, workspaceFileRefs);
            fs.writeFileSync(wsPkgPath, JSON.stringify(wsPkg, null, 2));
          }

          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          EOF

          # Remove pnpm's virtual store and reinstall with plain npm
          rm -rf node_modules
          npm install --omit=dev --ignore-scripts
          # oclif is a devDep needed to run pack/manifest — install it as a prod dep
          npm install oclif --ignore-scripts
          npm shrinkwrap --ignore-scripts

          # Symlink .git so oclif can resolve git HEAD
          ln -s ${{ github.workspace }}/.git .git

      - name: Generate oclif manifest
        working-directory: ${{ runner.temp }}/mbs-deploy
        run: ./node_modules/.bin/oclif manifest

      - name: Pack tarballs for Mac + Windows
        working-directory: ${{ runner.temp }}/mbs-deploy
        run: ./node_modules/.bin/oclif pack tarballs --targets darwin-x64,darwin-arm64,win32-x64

      - name: Upload packed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers
          path: ${{ runner.temp }}/mbs-deploy/dist/*.tar.gz

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: pack

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: installers
          path: dist/

      - name: Generate Release Notes
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${CURRENT_TAG}$" | head -n 1)

          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"%s" "${PREV_TAG}..HEAD")
          fi

          FEATURES=""
          FIXES=""
          MAINTENANCE=""

          while IFS= read -r msg; do
            if [[ "$msg" =~ ^feat(\(.+\))?: ]]; then
              FEATURES="${FEATURES}- ${msg}\n"
            elif [[ "$msg" =~ ^fix(\(.+\))?: ]]; then
              FIXES="${FIXES}- ${msg}\n"
            elif [[ "$msg" =~ ^(chore|ci|docs|refactor|perf|test|build)(\(.+\))?: ]]; then
              MAINTENANCE="${MAINTENANCE}- ${msg}\n"
            fi
          done <<< "$COMMITS"

          BODY=""
          if [ -n "$FEATURES" ]; then
            BODY="${BODY}## 新功能\n${FEATURES}\n"
          fi
          if [ -n "$FIXES" ]; then
            BODY="${BODY}## Bug 修复\n${FIXES}\n"
          fi
          if [ -n "$MAINTENANCE" ]; then
            BODY="${BODY}## 维护\n${MAINTENANCE}\n"
          fi
          if [ -z "$BODY" ]; then
            BODY="本次发布无 Conventional Commits 格式提交记录。\n"
          fi

          printf "%b" "$BODY" > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release_notes.md
          files: dist/*.tar.gz
          draft: false
          prerelease: false
