name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  pack:
    name: Build & Pack
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Create CLI deploy bundle
        # pnpm deploy flattens workspace packages into a self-contained directory
        # so oclif pack can find @mbs/org and @mbs/shared without symlink issues
        run: |
          pnpm deploy --filter @mbs/cli --legacy ${{ runner.temp }}/mbs-deploy
          ln -s ${{ github.workspace }}/.git ${{ runner.temp }}/mbs-deploy/.git

      - name: Generate oclif manifest
        working-directory: ${{ runner.temp }}/mbs-deploy
        run: ./node_modules/.bin/oclif manifest

      - name: Pack tarballs for Mac + Windows
        working-directory: ${{ runner.temp }}/mbs-deploy
        run: ./node_modules/.bin/oclif pack tarballs --targets darwin-x64,darwin-arm64,win32-x64

      - name: Upload packed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers
          path: ${{ runner.temp }}/mbs-deploy/dist/*.tar.gz

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: pack

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: installers
          path: dist/

      - name: Generate Release Notes
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${CURRENT_TAG}$" | head -n 1)

          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"%s" "${PREV_TAG}..HEAD")
          fi

          FEATURES=""
          FIXES=""
          MAINTENANCE=""

          while IFS= read -r msg; do
            if [[ "$msg" =~ ^feat(\(.+\))?: ]]; then
              FEATURES="${FEATURES}- ${msg}\n"
            elif [[ "$msg" =~ ^fix(\(.+\))?: ]]; then
              FIXES="${FIXES}- ${msg}\n"
            elif [[ "$msg" =~ ^(chore|ci|docs|refactor|perf|test|build)(\(.+\))?: ]]; then
              MAINTENANCE="${MAINTENANCE}- ${msg}\n"
            fi
          done <<< "$COMMITS"

          BODY=""
          if [ -n "$FEATURES" ]; then
            BODY="${BODY}## 新功能\n${FEATURES}\n"
          fi
          if [ -n "$FIXES" ]; then
            BODY="${BODY}## Bug 修复\n${FIXES}\n"
          fi
          if [ -n "$MAINTENANCE" ]; then
            BODY="${BODY}## 维护\n${MAINTENANCE}\n"
          fi
          if [ -z "$BODY" ]; then
            BODY="本次发布无 Conventional Commits 格式提交记录。\n"
          fi

          printf "%b" "$BODY" > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release_notes.md
          files: dist/*.tar.gz
          draft: false
          prerelease: false
